name: Basket
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Basket:
    type: application
    platform: iOS
    sources:
      - path: Sources
        # Assets.xcassets is excluded from the build for now: this machine has no
        # iOS simulator runtime matching the 26.5 SDK, so actool can't compile any
        # asset catalog ("No simulator runtime version … available"). The icon +
        # accent assets are kept in the repo, ready to re-enable once the matching
        # runtime is installed (remove this exclude + restore the settings below).
        excludes:
          - "Assets.xcassets"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Basket
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket
        GENERATE_INFOPLIST_FILE: NO
        # Re-add once a matching iOS simulator runtime is installed:
        #   ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        #   ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  BasketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Basket
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket.tests
schemes:
  Basket:
    build:
      targets:
        Basket: all
        BasketTests: [test]
    test:
      targets:
        - BasketTests
      gatherCoverageData: false
