name: Basket
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
# DEVELOPMENT_TEAM is intentionally not set here. It's machine-specific and
# comes from Signing.local.xcconfig (git-ignored) via Signing.xcconfig, so the
# committed project stays team-agnostic. See README → "Signing for a device".
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Basket:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Basket
        # No networking, no custom crypto — declared here so App Store Connect
        # stops asking the export-compliance question on every submission.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only by design (see above) — but iOS still lets an
        # iPhone-only app run in iPad's Split View/Slide Over multitasking by
        # default, which requires supporting all four orientations. This opts
        # the app out of that multitasking mode instead, which is what Apple's
        # own App Store Connect validation expects for a portrait-only app.
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  BasketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Basket
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket.tests
fileGroups:
  - StoreKit/Basket.storekit
schemes:
  Basket:
    build:
      targets:
        Basket: all
        BasketTests: [test]
    run:
      # Local StoreKit testing for the tip jar (used when Running from Xcode).
      storeKitConfiguration: StoreKit/Basket.storekit
    test:
      targets:
        - BasketTests
      gatherCoverageData: false
