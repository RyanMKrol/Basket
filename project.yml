name: Basket
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
# DEVELOPMENT_TEAM is intentionally not set here. It's machine-specific and
# comes from Signing.local.xcconfig (git-ignored) via Signing.xcconfig, so the
# committed project stays team-agnostic. See README → "Signing for a device".
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  # Snapshot (reference-image) tests in Tests/SnapshotTests.swift.
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Basket:
    type: application
    platform: iOS
    sources:
      - Sources
    # Embeds the widget extension into the app bundle so it ships and shows
    # up on the Home Screen widget gallery.
    dependencies:
      - target: BasketWidgetExtension
        embed: true
    # App Group: the SwiftData store lives in this shared container so the
    # Siri App Intent and widget extension read the same list. On the
    # simulator the entitlement alone is enough; a real-device/TestFlight build
    # also needs the App Groups capability enabled for this App ID (Automatic
    # signing registers it on the first device build). XcodeGen generates the
    # .entitlements plist from these properties, like it does Info.plist.
    entitlements:
      path: Sources/Basket.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryankrol.basket
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Basket
        # Marketing version. This is the source of truth: `xcodegen generate`
        # regenerates Sources/Info.plist from these properties on every build
        # (locally and in CI), so editing the plist directly is futile — the
        # next generate resets any key not listed here to XcodeGen's default
        # (CFBundleShortVersionString would fall back to "1.0"). Apple closes a
        # version's pre-release train once it's approved, so bump this to open
        # a new one before any further TestFlight/App Store upload, even
        # mid-cycle.
        CFBundleShortVersionString: "1.0.1"
        # Build number — must be unique per upload for a given marketing
        # version. release.yml overrides this with the CI run number for every
        # TestFlight upload, so this literal only matters for local/Xcode builds.
        CFBundleVersion: "2"
        # No networking, no custom crypto — declared here so App Store Connect
        # stops asking the export-compliance question on every submission.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only by design (see above) — but iOS still lets an
        # iPhone-only app run in iPad's Split View/Slide Over multitasking by
        # default, which requires supporting all four orientations. This opts
        # the app out of that multitasking mode instead, which is what Apple's
        # own App Store Connect validation expects for a portrait-only app.
        UIRequiresFullScreen: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - basket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # XcodeGen applies its own default of "1,2" (universal) for
        # `type: application` targets, which silently overrides the
        # project-level TARGETED_DEVICE_FAMILY above — Xcode still derives
        # the compiled Info.plist's UIDeviceFamily from this target-level
        # value even with GENERATE_INFOPLIST_FILE: NO, so without this
        # override the shipped binary was universal despite being meant as
        # iPhone-only, and App Store Connect required iPad screenshots for
        # an app never designed or tested on iPad.
        TARGETED_DEVICE_FAMILY: "1"
  BasketWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - BasketWidget
      # Read-only reuse of the app's models + pure logic so the widget shows
      # the exact same data shape and emoji as the app (see project.yml
      # comment on the Basket target's App Group entitlement, and
      # Sources/Support/AppSchema.swift). Recompiled directly into this
      # extension target rather than depending on target Basket, since an
      # app-extension target can't embed another app's product.
      - path: Sources/Models/GroceryItem.swift
      - path: Sources/Models/KnownItem.swift
      - path: Sources/Services/ListLogic.swift
      - path: Sources/Services/Emoji.swift
      - path: Sources/Services/EmojiTable.swift
      - path: Sources/Services/SemanticEmoji.swift
      - path: Sources/Services/Measure.swift
      - path: Sources/Services/Seasonality.swift
      - path: Sources/Services/TestHooks.swift
      - path: Sources/Services/BasketWidgetSnapshot.swift
      - path: Sources/Services/CheckOffItemIntent.swift
      - path: Sources/Services/WidgetReload.swift
      - path: Sources/Support/AppGroup.swift
      - path: Sources/Support/AppSchema.swift
      - path: Sources/Support/BasketWidgetKind.swift
      - path: Sources/Support/A11yIDs.swift
      - path: Sources/Theme/Theme.swift
      - path: Sources/Theme/ThemePresets.swift
    entitlements:
      path: BasketWidget/BasketWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryankrol.basket
    info:
      path: BasketWidget/Info.plist
      properties:
        CFBundleDisplayName: Basket
        # Must match the containing app's CFBundleShortVersionString /
        # CFBundleVersion (Sources/Info.plist above) — Xcode warns otherwise.
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket.widget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
  BasketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      # TipJarTests drives SKTestSession against the same local StoreKit
      # config the Xcode run scheme uses.
      - path: StoreKit/Basket.storekit
        buildPhase: resources
    dependencies:
      - target: Basket
      - package: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket.tests
  BasketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
      # Compiled into both the app and this bundle, so seeded fixtures can't
      # drift from what the tests expect (see the file's comment).
      - path: Sources/Support/SharedFixtures.swift
      # Same mechanism, for the shared accessibility-identifier constants.
      - path: Sources/Support/A11yIDs.swift
    dependencies:
      - target: Basket
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.basket.uitests
fileGroups:
  - StoreKit/Basket.storekit
schemes:
  Basket:
    build:
      targets:
        Basket: all
        BasketWidgetExtension: all
        BasketTests: [test]
        BasketUITests: [test]
    run:
      # Local StoreKit testing for the tip jar (used when Running from Xcode).
      storeKitConfiguration: StoreKit/Basket.storekit
    test:
      targets:
        - BasketTests
        - BasketUITests
      gatherCoverageData: true
