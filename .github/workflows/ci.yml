name: CI

# main is the shared integration point everyone merges their own worktree
# branch into directly (see CLAUDE.md — this repo doesn't use pull requests),
# so there's no review step to catch a broken build/test before it lands.
# Running on every branch push gives each worktree branch a pre-merge signal;
# the run on main after the merge is the final backstop. The nightly schedule
# drives the flake-hunt job only (see below). workflow_dispatch drives the
# record-snapshots job only — see SnapshotTests.swift.
on:
  push:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      record_snapshots:
        description: "Record snapshots (refresh Tests/__Snapshots__ on this runner instead of verifying against them)"
        type: boolean
        default: true

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Errors fail the merge gate; warnings (e.g. long comment lines) are
      # advisory only. See .swiftlint.yml.
      - name: Lint
        run: |
          brew install swiftlint
          swiftlint lint

      - name: Select Xcode 26
        uses: ./.github/actions/select-xcode

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve an available iPhone simulator
        id: sim
        uses: ./.github/actions/resolve-simulator

      # No retries here on purpose: a flaky test should fail the merge gate
      # loudly, not be papered over. The nightly flake-hunt job is where
      # repetition lives. Test timeouts turn a hung test (e.g. an await that
      # never resolves) into a failure instead of a wedged runner.
      - name: XCTest + XCUITest suite
        run: |
          xcodebuild test \
            -project Basket.xcodeproj -scheme Basket \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -test-timeouts-enabled YES -default-test-execution-time-allowance 600 \
            -resultBundlePath TestResults.xcresult

      # The failure screenshots and accessibility-audit logs live inside the
      # result bundle — exactly what's needed to diagnose a UI-test failure,
      # and gone with the runner unless uploaded.
      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

      # The same pure-logic Sources files, compiled and run natively on macOS —
      # fast, no simulator. See README.md → Tests.
      - name: Native logic harness
        run: |
          swiftc Sources/Services/Emoji.swift Sources/Services/EmojiTable.swift \
                 Sources/Services/SemanticEmoji.swift Sources/Services/Suggestions.swift \
                 Sources/Services/SuggestionDictionary.swift Sources/Models/Suggestion.swift \
                 Sources/Services/Formatting.swift \
                 Sources/Services/Measure.swift Sources/Services/Seasonality.swift \
                 tools/main.swift -o /tmp/basket_check
          /tmp/basket_check

  # Nightly: run every test up to 5 times, stopping at the first failure —
  # a test that only fails sometimes is exactly what this surfaces. Kept out
  # of the push-triggered job so the merge signal stays fast and strict.
  flake-hunt:
    if: github.event_name == 'schedule'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: ./.github/actions/select-xcode

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve an available iPhone simulator
        id: sim
        uses: ./.github/actions/resolve-simulator

      - name: Run the suite repeatedly to surface flakes
        run: |
          xcodebuild test \
            -project Basket.xcodeproj -scheme Basket \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -test-timeouts-enabled YES -default-test-execution-time-allowance 600 \
            -test-iterations 5 -run-tests-until-failure \
            -resultBundlePath FlakeHunt.xcresult

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flake-hunt-results
          path: FlakeHunt.xcresult
          retention-days: 14

  # Re-records Tests/__Snapshots__ on THIS runner (see SnapshotTests.swift for
  # why that matters) instead of verifying against the existing references.
  # SnapshotTesting intentionally fails a recording run to flag it for review,
  # so the artifact upload runs regardless of outcome — download it, eyeball
  # the diff, and commit the refreshed PNGs.
  record-snapshots:
    if: github.event_name == 'workflow_dispatch' && inputs.record_snapshots
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: ./.github/actions/select-xcode

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve an available iPhone simulator
        id: sim
        uses: ./.github/actions/resolve-simulator

      - name: Record SnapshotTests references
        env:
          BASKET_RECORD_SNAPSHOTS: "1"
        run: |
          xcodebuild test \
            -project Basket.xcodeproj -scheme Basket \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -only-testing:BasketTests/SnapshotTests \
            -resultBundlePath RecordSnapshots.xcresult || true

      - name: Upload refreshed references
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: Tests/__Snapshots__
          retention-days: 14
